<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — EduTech Dashboard</title>
  <meta name="description" content="Halaman login admin dashboard EduTech" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060818;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --blue: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: -200px; left: -200px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #2563eb 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation-delay: -3s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -6s;
      opacity: 0.15;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Card */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.2),
        0 32px 64px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
      border-radius: 20px;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.4);
    }
    .logo-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .logo-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin-bottom: 32px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-secondary);
      pointer-events: none;
      z-index: 1;
    }
    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
    .form-input:focus {
      border-color: var(--purple);
      background: rgba(124,58,237,0.08);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    /* Error alert */
    .error-alert {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #fca5a5;
      font-size: 14px;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,58,237,0.5); }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">🎓</div>
        <div class="logo-title">EduTech Admin</div>
        <div class="logo-subtitle">Dashboard Manajemen Sistem</div>
      </div>

      <div class="divider"></div>

      {% if error %}
      <div class="error-alert" id="errorAlert">
        <span>⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              id="username"
              name="username"
              type="text"
              class="form-input"
              placeholder="Masukkan username admin"
              required
              autofocus
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              name="password"
              type="password"
              class="form-input"
              placeholder="Masukkan password admin"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span id="btnText">Masuk ke Dashboard</span>
          <div class="btn-spinner" id="btnSpinner"></div>
        </button>
      </form>

      <div class="card-footer">
        Akun admin tersimpan aman di MongoDB &nbsp;·&nbsp; EduTech © 2026
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function () {
      const btn = document.getElementById('submitBtn');
      const text = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      btn.disabled = true;
      text.style.display = 'none';
      spinner.style.display = 'block';
    });
  </script>
</body>
</html>
